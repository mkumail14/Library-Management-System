<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Books</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-bar">
        <div class="logo">Library System</div>
        <div class="menu">
            <a href="index.html" class="tab-link active">Manage Books</a>
            <a href="issue_return.html" class="tab-link">Issue & Return</a>
            <a href="systems.html" class="tab-link">System Logs & Credits</a>
        </div>
    </nav>

    <div class="main-container">
        <header class="main-header">
            <h1>Library Management System</h1>
        </header>

        <div class="row">
            <div class="box">
                <h3>Add New Book</h3>
                <p class="note">Book ID starts from 1000 and increments automatically.</p>
                <div class="input-div">
                    <label>Book Title</label>
                    <input type="text" id="titleInput" placeholder="Enter title">
                </div>
                <div class="input-div">
                    <label>Author Name</label>
                    <input type="text" id="authorInput" placeholder="Enter author">
                </div>
                <div class="input-div">
                    <label>Choose Genre</label>
                    <select id="genreInput">
                        <option value="Horror">Horror</option>
                        <option value="Suspense">Suspense</option>
                        <option value="Action">Action</option>
                    </select>
                </div>
                <button class="btn btn-blue" onclick="addBook()">Add Book</button>
            </div>

            <div class="box">
                <h3>Register Member</h3>
                <p class="note">Member ID starts from 2000 and increments automatically.</p>
                <div class="input-div">
                    <label>Member Name</label>
                    <input type="text" id="memberNameInput" placeholder="Enter full name">
                </div>
                <div class="input-div">
                    <label>Member Type</label>
                    <select id="memberTypeInput">
                        <option value="Student">Student</option>
                        <option value="Faculty">Faculty</option>
                    </select>
                </div>
                <button class="btn btn-blue" style="margin-top: 60px;" onclick="addMember()">Add Member</button>
            </div>

            <div class="box full-width">
                <h3>All Books in Library</h3>
                <div class="search-bar">
                    <input type="text" id="searchTitle" placeholder="Search book by exact title...">
                    <button class="btn btn-dark" onclick="searchBook()">Search (Binary Search)</button>
                    
                    <select id="sortCriteria" style="max-width: 180px;">
                        <option value="title">Sort by Name</option>
                        <option value="id">Sort by ID</option>
                        <option value="timestamp">Sort by Date Created</option>
                    </select>
                    <button class="btn btn-dark" onclick="sortBooks()">Sort List (Merge Sort)</button>
                </div>
                <div class="list-container" id="bookListDisplay">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
